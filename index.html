      const delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));

      const callGeminiAPI = async (prompt, systemInstruction, schema = null, mediaData = null, model = 'gemini-2.5-flash') => {
        const userApiKey = getApiKey();
        
        if (!userApiKey) {
           throw new Error("API Key Missing: Please enter your Gemini API key in the Profile tab, or add it to the code.");
        }
        if (!userApiKey.startsWith("AIza")) {
           throw new Error("Invalid API Key Format: Your key should start with 'AIza'.");
        }
        
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${userApiKey}`;
        
        const parts = [];
        if (prompt) parts.push({ text: prompt });
        
        if (mediaData) {
          parts.push({
            inlineData: { mimeType: mediaData.mimeType, data: mediaData.data }
          });
        }

        const payload = {
          contents: [{ parts: parts }],
          systemInstruction: { parts: [{ text: systemInstruction }] }
        };

        if (schema) {
          payload.generationConfig = { responseMimeType: "application/json", responseSchema: schema };
        }

        const retries = [1000, 2000, 4000, 8000];
        let attempt = 0;

        while (attempt <= retries.length) {
          try {
            const response = await fetch(url, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });

            if (!response.ok) {
              const errData = await response.json().catch(() => ({}));
              throw new Error(`API Error ${response.status}: ${errData?.error?.message || response.statusText}`);
            }

            const data = await response.json();
            const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
            if (!text) throw new Error("Empty response from Gemini");

            return schema ? JSON.parse(text) : text;
          } catch (error) {
            if (attempt === retries.length) {
              console.error("Gemini API failed:", error);
              throw error;
            }
            await delay(retries[attempt]);
            attempt++;
          }
        }
      };

              console.error("Failed to sync data:", err);
            }).saveAppData(dataToSave);
          }
        };

        const addXP = (amount) => {
          const newProfile = { ...profile, xp: profile.xp + amount };
          setProfile(newProfile);
          return newProfile;
        };

        const logActivity = (type, subject, details, result) => {
          const newEntry = {
            id: Date.now(),
            date: new Date().toLocaleString(),
            type,
            subject,
            details,
            result
          };
          const newLog = [newEntry, ...activityLog];
          setActivityLog(newLog);
          return newLog;
        };

        const getTopicStats = (subject, topic) => {
          const topicHistory = performanceHistory.filter(h => h.subject === subject && h.topic === topic);
          if (topicHistory.length === 0) return null;
          const last = topicHistory[topicHistory.length - 1].score;
          const avg = Math.round(topicHistory.reduce((acc, curr) => acc + curr.score, 0) / topicHistory.length);
          return { last, avg };
        };

        const getSyllabusCardColor = (avgScore) => {
          if (avgScore >= 80) return 'bg-green-50 border-green-200';
          if (avgScore >= 50) return 'bg-yellow-50 border-yellow-300';
          return 'bg-red-50 border-red-200';
        };

        const speakText = (text) => {
          if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); 
            const cleanText = text.replace(/\*\*/g, '').replace(/\*/g, '');
            const utterance = new SpeechSynthesisUtterance(cleanText);
            window.speechSynthesis.speak(utterance);
          } else {
            setError("Text-to-speech is not supported in your browser.");
          }
        };

        const toggleMicrophoneNative = async () => {
          if (isRecordingAudio) {
             mediaRecorderRef.current.stop();
             setIsRecordingAudio(false);
             return;
          }

          if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
             setError("Microphone API blocked by browser security (ensure you are using https).");
             return;
          }

          try {
             const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
             const mediaRecorder = new MediaRecorder(stream);
             mediaRecorderRef.current = mediaRecorder;
             audioChunksRef.current = [];

             mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) audioChunksRef.current.push(e.data);
             };

             mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunksRef.current, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.readAsDataURL(audioBlob);
                reader.onloadend = () => {
                   const base64Audio = reader.result.split(',')[1];
                   handleAskHomeworkAudio(base64Audio, 'audio/webm');
                };
                stream.getTracks().forEach(track => track.stop()); // Close mic
             };

             mediaRecorder.start();
             setIsRecordingAudio(true);
          } catch (err) {
             console.error(err);
             setError("Microphone blocked. Check your browser permissions.");
          }
        };

        const disconnectLiveAPI = () => {
          if (wsRef.current) {
            wsRef.current.close();
            wsRef.current = null;
          }
          setLiveStatus('none');
          setCurrentStream("");
          currentStreamRef.current = "";
        };

        const handleStartLiveDiscussion = () => {
          const currentApiKey = getApiKey();
          if (!currentApiKey) {
             setError("API Key Missing: Please enter your Gemini API key in the Profile Setup tab to use Live Discussion.");
             return;
          }
          if (!currentApiKey.startsWith("AIza")) {
             setError("Invalid API Key: Your key must start with 'AIza'. Please check the Profile tab.");
             return;
          }

          setIsDiscussionMode(true);
          setHwChat([]);
          setError(null);
          setCurrentStream("");
          currentStreamRef.current = "";
          setLiveStatus('connecting');
          setLoading(true);

          const currentLevel = (profile.subjectLevels && profile.subjectLevels[hwSubjectContext]) || 'Higher';
          const systemPrompt = `You are a live Socratic tutor for an Irish Leaving Certificate student studying ${hwSubjectContext} at ${currentLevel} level.
          You are initiating a Live Discussion.
          RULE 1: Do NOT give long explanations.
          RULE 2: Ask exactly ONE probing question at a time to test their understanding.
          RULE 3: Wait for their answer, evaluate it, gently correct if needed, and ask the next logical question to deepen understanding.`;
          
          const currentContext = subjectContexts && subjectContexts[hwSubjectContext];
          let contextString = currentContext ? `Based on this context material:\n${currentContext}\n` : `Based on general ${hwSubjectContext} syllabus.\n`;
          if (activeFocusTopic) {
            contextString += `Specific Focus Topic: ${activeFocusTopic}\n`;
          }
          
          const initialContext = `Start a Socratic discussion. ${contextString}Introduce the topic briefly, act like a live tutor, and ask your first question.`;

          const startRestDiscussion = async () => {
            try {
              const response = await callGeminiAPI(initialContext, systemPrompt, null, null, 'gemini-3-flash'); 
              setHwChat([{ role: 'tutor', content: response }]);
              speakText(response);
              setLiveStatus('rest');
              const newLog = logActivity("Live Discussion (REST)", hwSubjectContext, "Started Socratic discussion", "In Progress");
              persistData(profile, performanceHistory, newLog);
            } catch (err) {
              setError(`Failed to start discussion: ${err.message}`);
              setIsDiscussionMode(false);
              setLiveStatus('none');
            } finally {
              setLoading(false);
            }
          };

          try {
            const wsUrl = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1alpha.GenerativeService.BidiGenerateContent?key=${currentApiKey}`;
            const ws = new WebSocket(wsUrl);
            wsRef.current = ws;

            let isSetup = false;

            const connectionTimeout = setTimeout(() => {
              if (!isSetup) {
                if (wsRef.current) { wsRef.current.close(); wsRef.current = null; }
                console.warn("WebSocket timed out. Falling back to REST.");
                startRestDiscussion();
              }
            }, 5000);

            ws.onopen = () => {
              ws.send(JSON.stringify({
                setup: {
                  model: "models/gemini-3-flash-live", 
                  systemInstruction: { parts: [{ text: systemPrompt }] }
                }
              }));
            };

            ws.onmessage = async (event) => {
              try {
                let textData = event.data;
                if (textData instanceof Blob) {
                   textData = await textData.text();
                }
                const data = JSON.parse(textData);
                
                if (data.error) {
                   console.error("Live API Error:", data.error.message);
                   return; 
                }

                if (data.setupComplete) {
                  isSetup = true;
                  clearTimeout(connectionTimeout);
                  setLiveStatus('ws');
                  setLoading(false);
                  ws.send(JSON.stringify({
                    clientContent: {
                      turns: [{ role: "user", parts: [{ text: initialContext }] }],
                      turnComplete: true
                    }
                  }));
                  const newLog = logActivity("Live Discussion", hwSubjectContext, "Started Socratic WebSocket session", "In Progress");
                  persistData(profile, performanceHistory, newLog);
                  
                } else if (data.serverContent) {
                  const parts = data.serverContent.modelTurn?.parts;
                  if (parts && parts.length > 0) {
                     const textChunk = parts[0].text || "";
                     currentStreamRef.current += textChunk;
                     setCurrentStream(currentStreamRef.current);
                  }
                  
                  if (data.serverContent.turnComplete) {
                     const finalText = currentStreamRef.current;
                     if (finalText.trim()) {
                       setHwChat(prev => [...prev, { role: 'tutor', content: finalText }]);
                       speakText(finalText);
                     }
                     setCurrentStream("");
                     currentStreamRef.current = "";
                  }
                }
              } catch (err) {
                console.error("Error parsing WS message", err);
              }
            };

            ws.onerror = (e) => {
              console.error("WS Error", e);
            };

            ws.onclose = (e) => {
              clearTimeout(connectionTimeout);
              if (!isSetup) {
                console.warn(`WebSocket closed before setup (Code: ${e.code}). Executing REST fallback.`);
                startRestDiscussion();
              } else {
                setLiveStatus('none');
                setLoading(false);
                if (!e.wasClean || e.code !== 1000) {
                   setError(`Live Session Disconnected. (Error Code: ${e.code})`);
                }
              }
            };
          } catch (e) {
            console.error("WebSocket instantiation failed:", e);
            startRestDiscussion();
          }
        };

        const handleContextFileUpload = (e, contextType, targetSubject) => {
          const file = e.target.files[0];

          if (contextType === 'quizMedia' && file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.onload = (event) => {
              const base64 = event.target.result.split(',')[1];
              setQuizMedia({ mimeType: file.type, data: base64, name: file.name });
            };
            reader.readAsDataURL(file);
          } else {
            const reader = new FileReader();
            reader.onload = (event) => {
              const currentContext = (subjectContexts && subjectContexts[targetSubject]) || '';
              const newContexts = { 
                ...subjectContexts, 
                [targetSubject]: currentContext + "\n\n--- Attached Notes ---\n" + event.target.result 
              };
              setSubjectContexts(newContexts);
              persistData(profile, performanceHistory, activityLog, newContexts);
            };
            reader.readAsText(file);
          }
        };

        const handleAskHomeworkAudio = async (base64Audio, mimeType) => {
          const newChat = [...hwChat, { role: 'user', content: '🎤 [Voice Message Sent]' }];
          setHwChat(newChat);
          setLoading(true);

             RULE 1: Evaluate the student's audio answer.
             RULE 2: If they are wrong, guide them to the answer, do not just give it.
             RULE 3: Ask ONE relevant follow-up question to test the next concept. Keep it highly conversational.`;
          } else {
             systemPrompt = `You are an expert Irish Leaving Certificate tutor for ${profile.year} studying ${hwSubjectContext} at ${currentLevel} level. The user has provided an audio question.
             Your goal is to help the student understand their homework. 
             CRITICAL: Do NOT just give the direct answer. Guide them, provide hints, explain concepts, and ask leading questions.`;
          }
          
          const savedContext = subjectContexts && subjectContexts[hwSubjectContext];
          let contextString = savedContext ? `Context material from student notes/syllabus selection:\n${savedContext}\n\n` : "";
          if (activeFocusTopic) {
            contextString += `Focus Topic: ${activeFocusTopic}\n\n`;
          }
          
          const prompt = `${contextString}Please transcribe and respond to the attached audio message.`;
          const mediaObj = { mimeType: mimeType, data: base64Audio };

          try {
            const targetModel = isDiscussionMode ? 'gemini-3-flash' : 'gemini-2.5-flash';
            const response = await callGeminiAPI(prompt, systemPrompt, null, mediaObj, targetModel); 
            setHwChat([...newChat, { role: 'tutor', content: response }]);
            if (isDiscussionMode) speakText(response);
            
            const newProfile = addXP(10); 
            const newLog = logActivity(isDiscussionMode ? "Live Discussion" : "Homework", hwSubjectContext, "Sent Voice Audio Message", "+10 XP");
            persistData(newProfile, performanceHistory, newLog);
          } catch (err) {
            setError(`Failed to process audio: ${err.message}`);
          } finally {
            setLoading(false);
          }
        };

        const handleAskHomework = async () => {
          if (!(hwQuestion || '').trim()) return;

                clientContent: {
                    turns: [{ role: "user", parts: [{ text: userMsg }] }],
                    turnComplete: true
                }
            }));
            const newProfile = addXP(10);

            persistData(newProfile, performanceHistory, newLog);
            return; 
          }

          setLoading(true);
          const currentLevel = (profile.subjectLevels && profile.subjectLevels[hwSubjectContext]) || 'Higher';
          
          let systemPrompt = '';

             systemPrompt = `You are a live Socratic tutor for an Irish Leaving Certificate student studying ${hwSubjectContext} at ${currentLevel} level.
             RULE 1: Evaluate the student's answer.
             RULE 2: If they are wrong, guide them to the answer, do not just give it.
             RULE 3: Ask ONE relevant follow-up question to test the next concept. Keep it highly conversational.`;
          } else {
             systemPrompt = `You are an expert Irish Leaving Certificate tutor for ${profile.year} studying ${hwSubjectContext} at ${currentLevel} level. 
             Your goal is to help the student understand their homework. 
             CRITICAL: Do NOT just give the direct answer. Guide them, provide hints, explain concepts, and ask leading questions.`;
          }
          
          const savedContext = subjectContexts && subjectContexts[hwSubjectContext];

          if (activeFocusTopic) {
            contextString += `Focus Topic: ${activeFocusTopic}\n\n`;

          let prompt = `${contextString}Student's question: ${userMsg}`;
          if (isDiscussionMode) {
            const chatHistoryText = newChat.map(m => `${m.role === 'tutor' ? 'Tutor' : 'Student'}: ${m.content}`).join('\n');
            prompt = `${contextString}Here is the conversation history:\n${chatHistoryText}\n\nRespond as the Tutor to the student's last message.`;
          }

          try {
            const targetModel = isDiscussionMode ? 'gemini-3-flash' : 'gemini-2.5-flash';

            setHwChat([...newChat, { role: 'tutor', content: response }]);
            if (isDiscussionMode) speakText(response);
            
            const newProfile = addXP(10);

          }

        const handleGenerateQuiz = async () => {
          const hasContext = ((subjectContexts && subjectContexts[quizSubjectContext]) || '').trim();
          if (!(quizTopic || '').trim() && !quizMedia && !hasContext) return;

          setError(null);
          setActiveQuiz(null);
          setQuizResults(null);
          setQuizAnswers({});

          const currentQuizLevel = (profile.subjectLevels && profile.subjectLevels[quizSubjectContext]) || 'Higher';
          const systemPrompt = `You are an expert Irish Leaving Certificate examiner for ${quizSubjectContext} (${currentQuizLevel} level).`;
          
          const sourceInstruction = quizSource === 'past_papers' 
            ? "CRITICAL INSTRUCTION: Style these questions EXACTLY like historical Irish Leaving Certificate past exam paper questions for this subject and level. Emulate the wording, typical mark allocation phrasing, and structure used by the State Examinations Commission." 
            : "Base the questions on general Leaving Certificate course content and syllabus requirements.";

          const topicInstruction = quizTopic ? `Topic: "${quizTopic}"` : "Create questions based on the provided uploaded file/image/saved context content.";

          const schema = {

                  properties: {

                    questionText: { type: "STRING" },
                    hint: { type: "STRING" }
                  }

          const prompt = `Topic: ${quizTopic || 'Uploaded Content'}\n\nHere are the questions and the student's answers:\n` +

              feedback: { type: "STRING", description: "General feedback on the performance and what syllabus areas to revise" },
              questionGrades: {
                type: "ARRAY",
                items: {
                  type: "OBJECT",
                  properties: {
                    id: { type: "STRING" },
                    score: { type: "NUMBER", description: "Score out of 10 for this question" },
                    correction: { type: "STRING", description: "How to improve or what was right/wrong" }
                  }
                }

            }

                                onChange={(e) => setQuizSource(e.target.value)}
                                className="w-4 h-4 text-indigo-600 focus:ring-indigo-500 border-gray-300"
                              />
                              <span className="text-slate-700">General Course Content</span>
                            </label>
                            <label className="flex items-center gap-3 cursor-pointer">
                              <input 
                                type="radio" 
                                name="quizSource" 
                                value="past_papers" 
                                checked={quizSource === 'past_papers'} 
                                onChange={(e) => setQuizSource(e.target.value)}
                                className="w-4 h-4 text-indigo-600 focus:ring-indigo-500 border-gray-300"
                              />
                              <span className="text-slate-700">Leaving Cert Past Papers Style</span>
                            </label>
                          </div>
                        </div>

                        <button 
                          onClick={handleGenerateQuiz}
                          disabled={loading || (!(quizTopic || '').trim() && !quizMedia && !((subjectContexts && subjectContexts[quizSubjectContext]) || '').trim())}
                          className="w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-400 text-white py-4 rounded-xl font-bold text-lg shadow-md transition-all flex items-center justify-center gap-2"
                        >
                          {loading ? 'Generating...' : 'Start Quiz'} <Star className="w-5 h-5"/>
                        </button>
                      </div>
                    </div>
                  )}

                  {activeQuiz && !quizResults && (
                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
                      <div className="flex justify-between items-center mb-6 border-b border-slate-100 pb-4">
                        <div>
                          <h2 className="text-2xl font-bold">{quizSubjectContext}: {quizTopic || "Custom Content"}</h2>
                          <p className="text-sm text-slate-500 mt-1">Source: {quizSource === 'past_papers' ? 'Past Papers Style' : 'Course Content'}</p>
                        </div>
                        <span className="bg-indigo-100 text-indigo-800 text-sm font-bold px-3 py-1 rounded-full">{(profile.subjectLevels && profile.subjectLevels[quizSubjectContext]) || 'Higher'} Level</span>
                      </div>
                      
                      <div className="space-y-8">
                        {activeQuiz?.map((q, idx) => (
                          <div key={q.id} className="bg-slate-50 p-6 rounded-xl border border-slate-100">
                            <p className="font-bold text-lg mb-4 text-slate-800"><span className="text-indigo-600 mr-2">Q{idx + 1}.</span> {q.questionText}</p>
                            <textarea
                              className="w-full h-32 p-4 bg-white border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none resize-none"
                              placeholder="Type your detailed answer here..."
                              value={quizAnswers[q.id] || ''}
                              onChange={(e) => setQuizAnswers({...quizAnswers, [q.id]: e.target.value})}
                            ></textarea>
                            {q.hint && (
                              <div className="mt-2 text-sm text-amber-600 flex items-center gap-1">
                                <AlertCircle className="w-4 h-4"/> Hint: {q.hint}
                              </div>
                            )}
                          </div>
                        ))}
                      </div>

                      <div className="mt-8 flex justify-end">
                        <button 
                          onClick={submitQuiz}
                          disabled={loading}
                          className="bg-green-600 hover:bg-green-700 text-white px-8 py-4 rounded-xl font-bold shadow-md transition-all flex items-center gap-2"
                        >
                          {loading ? 'Grading...' : 'Submit Answers'} <CheckCircle className="w-5 h-5"/>
                        </button>
                      </div>
                    </div>
                  )}

                  {quizResults && (
                    <div className="space-y-6">
                      <div className="bg-indigo-600 rounded-2xl shadow-lg p-8 text-white text-center relative overflow-hidden">
                        <div className="absolute top-0 right-0 p-8 opacity-10"><Trophy className="w-48 h-48"/></div>
                        <h2 className="text-3xl font-bold mb-2 relative z-10">Quiz Complete!</h2>
                        <div className="text-6xl font-black text-yellow-400 my-6 relative z-10">{quizResults.overallScore}%</div>
                        <p className="text-lg text-indigo-100 relative z-10">{quizResults.feedback}</p>
                        <p className="mt-4 inline-block bg-yellow-400 text-yellow-900 font-bold px-4 py-2 rounded-full relative z-10">
                          + {50 + Math.floor(quizResults.overallScore / 2)} XP Earned!
                        </p>
                      </div>

                      {/* --- TUTOR FEEDBACK BUTTON --- */}
                      <button 
                        onClick={handleReviewWithTutor}
                        disabled={loading}
                        className="w-full bg-white border-2 border-indigo-600 hover:bg-indigo-50 text-indigo-800 py-4 rounded-xl font-bold transition-all shadow-sm flex items-center justify-center gap-2"
                      >
                        <MessageSquare className="w-6 h-6"/> Ask Tutor for Revision Strategy based on this Quiz
                      </button>

                      <div className="space-y-6">
                        {quizResults.questionGrades?.map((grade, idx) => {
                          const question = activeQuiz?.find(q => q.id === grade.id);
                          const isPerfect = grade.score >= 9; 
                          return (
                            <div key={idx} className={`bg-white rounded-xl shadow-sm border p-6 ${isPerfect ? 'border-green-200' : 'border-slate-200'}`}>
                              <div className="flex justify-between items-start mb-4">
                                <p className="font-bold text-slate-800 flex-1"><span className="text-indigo-600 mr-2">Q.</span> {question?.questionText}</p>
                                <div className={`text-xl font-black px-4 py-2 rounded-lg ml-4 ${isPerfect ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-700'}`}>
                                  {grade.score}/10
                                </div>
                              </div>
                              <div className="bg-slate-50 p-4 rounded-lg mb-4 border border-slate-100">
                                <p className="text-sm text-slate-500 mb-1">Your Answer:</p>
                                <p className="text-slate-700">{quizAnswers[grade.id] || "No answer provided"}</p>
                              </div>
                              <div className="bg-indigo-50 text-indigo-900 p-4 rounded-lg flex items-start gap-3">
                                <Brain className="w-5 h-5 mt-0.5 flex-shrink-0 text-indigo-600" />
                                <p>{grade.correction}</p>
                              </div>
                            </div>
                          );
                        })}
                      </div>

                      <button 
                        onClick={() => {setActiveQuiz(null); setQuizResults(null); setActiveTab('syllabus');}}
                        className="w-full bg-slate-200 hover:bg-slate-300 text-slate-800 py-4 rounded-xl font-bold transition-all"
                      >
                        Back to Syllabus
                      </button>
                    </div>
                  )}

                </div>
              )}
            </main>
          </div>
        );
      }

      function NavButton({ icon, label, active, onClick }) {
        return (
          <button 
            onClick={onClick}
            className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${
              active 
                ? 'bg-indigo-600 text-white shadow-md' 
                : 'text-indigo-200 hover:bg-indigo-800/50 hover:text-white'
            }`}
          >
            {React.cloneElement(icon, { className: "w-5 h-5 shrink-0" })}
            <span className="font-medium text-left">{label}</span>
          </button>
        );
      }

      function StatCard({ icon, title, value, subtitle }) {
        return (
          <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 flex items-center gap-4">
            <div className="p-4 bg-slate-50 rounded-xl border border-slate-100 shrink-0">
              {icon}
            </div>
            <div className="overflow-hidden">
              <p className="text-sm font-medium text-slate-500 truncate">{title}</p>
              <p className="text-2xl font-black text-slate-800">{value}</p>
              <p className="text-xs text-slate-400 mt-1 truncate">{subtitle}</p>
            </div>
          </div>
        );
      }

      function InputField({ label, value, onChange, placeholder, type = "text", disabled = false }) {
        return (
          <div>
            <label className="block text-sm font-bold text-slate-700 mb-2">{label}</label>
            <input 
              type={type} 
              className={`w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition-all text-slate-800 ${disabled ? 'opacity-50 cursor-not-allowed' : ''}`}
              value={value} 
              onChange={onChange} 
              placeholder={placeholder}
              disabled={disabled}
            />
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);

    </script>
  </body>
</html>
